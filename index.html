<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#fafaf9" />
<title>인생네컷 | Life 4 Cuts</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>" />
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
  .font-serif-display { font-family: Georgia, 'Times New Roman', serif; }
  @keyframes flash { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
  .flash { animation: flash 0.3s ease-out; }
  @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
  .pop { animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module">
const { useState, useRef, useEffect } = React;

// 아이콘 컴포넌트 (Lucide 스타일)
const Icon = ({ d, className = "w-5 h-5", fill = "none" }) => (
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
    {d}
  </svg>
);
const CameraIcon = (p) => <Icon {...p} d={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />;
const DownloadIcon = (p) => <Icon {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
const RefreshIcon = (p) => <Icon {...p} d={<><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></>} />;
const HeartIcon = (p) => <Icon {...p} d={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>} />;
const SparkIcon = (p) => <Icon {...p} d={<path d="M12 2l2.35 7.24H22l-6.18 4.49L18.18 21 12 16.51 5.82 21l2.36-7.27L2 9.24h7.65L12 2z"/>} />;
const ShareIcon = (p) => <Icon {...p} d={<><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></>} />;

// 레이아웃 미리보기 썸네일
const LayoutPreview = ({ layout, active }) => {
  const w = 36;
  const h = w / layout.canvasRatio;
  const maxH = 48;
  const scale = h > maxH ? maxH / h : 1;
  const fw = w * scale;
  const fh = h * scale;
  return (
    <div
      className="relative rounded-sm"
      style={{
        width: `${fw}px`,
        height: `${fh}px`,
        backgroundColor: active ? 'rgba(255,255,255,0.15)' : '#e7e5e4',
        border: active ? '1px solid rgba(255,255,255,0.3)' : '1px solid #d6d3d1',
      }}
    >
      {layout.slots.map((s, i) => (
        <div
          key={i}
          className="absolute rounded-[1px]"
          style={{
            left: `${s.x * 100}%`,
            top: `${s.y * 100}%`,
            width: `${s.w * 100}%`,
            height: `${s.h * 100}%`,
            backgroundColor: active ? 'rgba(255,255,255,0.7)' : '#a8a29e',
          }}
        />
      ))}
    </div>
  );
};

function Life4Cuts() {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const finalCanvasRef = useRef(null);
  const streamRef = useRef(null);

  const [stage, setStage] = useState('start');
  const [photos, setPhotos] = useState([]);
  const [countdown, setCountdown] = useState(null);
  const [currentShot, setCurrentShot] = useState(0);
  const [frameColor, setFrameColor] = useState('black');
  const [filter, setFilter] = useState('none');
  const [layout, setLayout] = useState('classic');
  const [finalImage, setFinalImage] = useState(null);
  const [error, setError] = useState(null);
  const [isFlashing, setIsFlashing] = useState(false);

  // 레이아웃 정의: photoCount, 캔버스 크기, 각 사진의 위치/크기 (비율 0~1)
  // 사진 사이/주변에 프레임 배경색이 보이도록 간격을 둠
  const layouts = [
    {
      name: 'classic',
      label: '클래식',
      photoCount: 4,
      canvasRatio: 1 / 3,
      slots: [
        { x: 0.08, y: 0.025, w: 0.84, h: 0.185 },
        { x: 0.08, y: 0.225, w: 0.84, h: 0.185 },
        { x: 0.08, y: 0.425, w: 0.84, h: 0.185 },
        { x: 0.08, y: 0.625, w: 0.84, h: 0.185 },
      ],
      textY: 0.86,
    },
    {
      name: 'grid',
      label: '2x2 그리드',
      photoCount: 4,
      canvasRatio: 0.85,
      slots: [
        { x: 0.05, y: 0.04, w: 0.43, h: 0.39 },
        { x: 0.52, y: 0.04, w: 0.43, h: 0.39 },
        { x: 0.05, y: 0.45, w: 0.43, h: 0.39 },
        { x: 0.52, y: 0.45, w: 0.43, h: 0.39 },
      ],
      textY: 0.88,
    },
    {
      name: 'wide',
      label: '와이드',
      photoCount: 4,
      canvasRatio: 1.33,
      slots: [
        { x: 0.04, y: 0.06, w: 0.21, h: 0.72 },
        { x: 0.27, y: 0.06, w: 0.21, h: 0.72 },
        { x: 0.50, y: 0.06, w: 0.21, h: 0.72 },
        { x: 0.73, y: 0.06, w: 0.21, h: 0.72 },
      ],
      textY: 0.84,
    },
    {
      name: 'highlight',
      label: '하이라이트',
      photoCount: 4,
      canvasRatio: 0.6,
      slots: [
        { x: 0.06, y: 0.03, w: 0.88, h: 0.36 },
        { x: 0.06, y: 0.405, w: 0.28, h: 0.19 },
        { x: 0.36, y: 0.405, w: 0.28, h: 0.19 },
        { x: 0.66, y: 0.405, w: 0.28, h: 0.19 },
      ],
      textY: 0.66,
    },
    {
      name: 'six',
      label: '2x3 (6장)',
      photoCount: 6,
      canvasRatio: 0.55,
      slots: [
        { x: 0.05, y: 0.025, w: 0.43, h: 0.250 },
        { x: 0.52, y: 0.025, w: 0.43, h: 0.250 },
        { x: 0.05, y: 0.290, w: 0.43, h: 0.250 },
        { x: 0.52, y: 0.290, w: 0.43, h: 0.250 },
        { x: 0.05, y: 0.555, w: 0.43, h: 0.250 },
        { x: 0.52, y: 0.555, w: 0.43, h: 0.250 },
      ],
      textY: 0.84,
    },
  ];

  const frameColors = [
    { name: 'black', label: '블랙', bg: '#1a1a1a', text: '#ffffff' },
    { name: 'white', label: '화이트', bg: '#fafafa', text: '#1a1a1a' },
    { name: 'pink', label: '핑크', bg: '#ffd1dc', text: '#8b2c4a' },
    { name: 'mint', label: '민트', bg: '#b8e6d1', text: '#1a5d3f' },
    { name: 'lavender', label: '라벤더', bg: '#d4c5e8', text: '#4a2d6b' },
    { name: 'cream', label: '크림', bg: '#f5e6c8', text: '#6b4423' },
    { name: 'navy', label: '네이비', bg: '#1e2a4a', text: '#f0e9d2' },
    { name: 'sage', label: '세이지', bg: '#a8b5a0', text: '#2d3a28' },
  ];

  const filters = [
    { name: 'none', label: '원본', css: 'none' },
    { name: 'warm', label: '웜톤', css: 'saturate(1.2) contrast(1.05) sepia(0.15)' },
    { name: 'cool', label: '쿨톤', css: 'saturate(1.1) contrast(1.05) hue-rotate(-10deg)' },
    { name: 'bw', label: '흑백', css: 'grayscale(1) contrast(1.1)' },
    { name: 'vintage', label: '빈티지', css: 'sepia(0.4) saturate(1.3) contrast(0.95)' },
    { name: 'bright', label: '화사', css: 'brightness(1.1) saturate(1.3) contrast(1.05)' },
    { name: 'soft', label: '소프트', css: 'brightness(1.05) contrast(0.9) saturate(0.9)' },
  ];

  useEffect(() => {
    return () => {
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(track => track.stop());
      }
    };
  }, []);

  const startCamera = async () => {
    // HTTPS 체크
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      setError('카메라는 HTTPS 환경에서만 작동해요. GitHub Pages 주소(https://...)로 접속해주세요.');
      return;
    }

    // getUserMedia 지원 체크
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setError('이 브라우저는 카메라를 지원하지 않아요. Chrome이나 Safari를 사용해보세요.');
      return;
    }

    try {
      // 먼저 stage를 ready로 바꿔서 video 엘리먼트가 렌더링되게 함
      setStage('ready');
      setError(null);

      // video 엘리먼트가 DOM에 나타날 때까지 잠깐 대기
      await new Promise(r => setTimeout(r, 100));

      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false,
      });

      streamRef.current = stream;

      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        // iOS Safari를 위한 추가 처리
        videoRef.current.setAttribute('playsinline', 'true');
        videoRef.current.setAttribute('muted', 'true');
        videoRef.current.muted = true;

        // 비디오 재생 시도
        try {
          await videoRef.current.play();
        } catch (playErr) {
          console.warn('자동 재생 실패, 사용자 상호작용 필요:', playErr);
        }
      }
    } catch (err) {
      console.error('카메라 오류:', err);
      let msg = '카메라를 시작할 수 없어요. ';
      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        msg += '브라우저 설정에서 카메라 권한을 허용해주세요.';
      } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
        msg += '카메라를 찾을 수 없어요.';
      } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
        msg += '다른 앱이 카메라를 사용 중이에요. 다른 앱을 종료해주세요.';
      } else {
        msg += err.message || '알 수 없는 오류';
      }
      setError(msg);
      setStage('start');
    }
  };

  const takePhoto = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return null;

    const ctx = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.save();
    ctx.scale(-1, 1);
    ctx.translate(-canvas.width, 0);
    ctx.filter = filters.find(f => f.name === filter)?.css || 'none';
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    return canvas.toDataURL('image/jpeg', 0.92);
  };

  const startCapture = async () => {
    setStage('capturing');
    setPhotos([]);
    const newPhotos = [];
    const currentLayout = layouts.find(l => l.name === layout);
    const shotCount = currentLayout.photoCount;

    for (let i = 0; i < shotCount; i++) {
      setCurrentShot(i + 1);
      for (let c = 5; c > 0; c--) {
        setCountdown(c);
        await new Promise(r => setTimeout(r, 1000));
      }
      setCountdown('📸');
      setIsFlashing(true);
      await new Promise(r => setTimeout(r, 150));
      const photo = takePhoto();
      setIsFlashing(false);
      if (photo) {
        newPhotos.push(photo);
        setPhotos([...newPhotos]);
      }
      setCountdown(null);
      await new Promise(r => setTimeout(r, 600));
    }

    setStage('done');
    setCurrentShot(0);
  };

  useEffect(() => {
    const currentLayout = layouts.find(l => l.name === layout);
    if (stage !== 'done' || photos.length !== currentLayout.photoCount) return;

    const canvas = finalCanvasRef.current;
    if (!canvas) return;

    const ctx = canvas.getContext('2d');
    const baseSize = 1200; // 기준 크기
    const frameW = baseSize;
    const frameH = Math.round(baseSize / currentLayout.canvasRatio);
    canvas.width = frameW;
    canvas.height = frameH;

    const colorObj = frameColors.find(c => c.name === frameColor);
    ctx.fillStyle = colorObj.bg;
    ctx.fillRect(0, 0, frameW, frameH);

    let loadedCount = 0;
    const images = [];

    photos.forEach((src, idx) => {
      const img = new Image();
      img.onload = () => {
        images[idx] = img;
        loadedCount++;
        if (loadedCount === currentLayout.photoCount) {
          images.forEach((image, i) => {
            const slot = currentLayout.slots[i];
            const dx = slot.x * frameW;
            const dy = slot.y * frameH;
            const dw = slot.w * frameW;
            const dh = slot.h * frameH;

            // 이미지 비율 맞춰서 크롭 (object-fit: cover)
            const imgRatio = image.width / image.height;
            const targetRatio = dw / dh;
            let sx = 0, sy = 0, sw = image.width, sh = image.height;
            if (imgRatio > targetRatio) {
              sw = image.height * targetRatio;
              sx = (image.width - sw) / 2;
            } else {
              sh = image.width / targetRatio;
              sy = (image.height - sh) / 2;
            }
            ctx.drawImage(image, sx, sy, sw, sh, dx, dy, dw, dh);
          });

          // 하단 텍스트 - textY를 텍스트 블록의 상단 기준으로
          const textTopY = currentLayout.textY * frameH;
          ctx.fillStyle = colorObj.text;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';

          const titleSize = Math.round(frameW * 0.042);
          ctx.font = `bold ${titleSize}px Georgia, serif`;
          ctx.fillText('Life 4 Cuts', frameW / 2, textTopY);

          const dateSize = Math.round(frameW * 0.024);
          ctx.font = `${dateSize}px Georgia, serif`;
          const date = new Date();
          const dateStr = `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
          ctx.fillText(dateStr, frameW / 2, textTopY + titleSize + 8);

          setFinalImage(canvas.toDataURL('image/jpeg', 0.95));
        }
      };
      img.src = src;
    });
  }, [stage, photos, frameColor, layout]);

  const downloadImage = async () => {
    if (!finalImage) return;

    // 인앱 브라우저(인스타, 페이스북, 카카오 등) 감지
    const ua = navigator.userAgent || '';
    const isInApp = /Instagram|FBAN|FBAV|KAKAOTALK|Line|NAVER|everytimeApp/i.test(ua);

    // 1순위: Web Share API (파일 공유) — 인앱에서도 대부분 작동
    try {
      const res = await fetch(finalImage);
      const blob = await res.blob();
      const file = new File([blob], `life4cuts_${Date.now()}.jpg`, { type: 'image/jpeg' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: '인생네컷' });
        return;
      }
    } catch (e) {
      // share 실패 시 다음 방법으로
    }

    // 2순위: 인앱 브라우저면 새 탭에 이미지 열기 (길게 눌러 저장 안내)
    if (isInApp) {
      const win = window.open();
      if (win) {
        win.document.write(`
          <html><head><title>인생네컷 저장</title>
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <style>body{margin:0;background:#000;color:#fff;font-family:sans-serif;text-align:center;padding:20px;}
          img{max-width:100%;height:auto;border-radius:8px;margin-top:20px;}
          .tip{background:#fbbf24;color:#000;padding:12px;border-radius:8px;font-weight:bold;font-size:15px;}
          </style></head>
          <body>
          <div class="tip">📱 이미지를 길게 눌러 "이미지 저장"을 선택하세요</div>
          <img src="${finalImage}" alt="인생네컷"/>
          </body></html>
        `);
        win.document.close();
      } else {
        setError('저장을 위해 브라우저(Chrome/Safari)로 열어주세요. 주소창 옆 ⋮ 메뉴에서 "브라우저로 열기"를 누르세요.');
      }
      return;
    }

    // 3순위: 일반 브라우저 — 기본 다운로드
    const link = document.createElement('a');
    link.download = `life4cuts_${Date.now()}.jpg`;
    link.href = finalImage;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const shareImage = async () => {
    if (!finalImage) return;
    try {
      const res = await fetch(finalImage);
      const blob = await res.blob();
      const file = new File([blob], `life4cuts_${Date.now()}.jpg`, { type: 'image/jpeg' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: '인생네컷' });
        return;
      }
    } catch (e) {
      // 공유 실패 시 다운로드로 fallback
    }
    downloadImage();
  };

  const reset = async () => {
    setPhotos([]);
    setFinalImage(null);
    setCurrentShot(0);
    setStage('ready');

    // video 엘리먼트가 다시 렌더링될 때까지 대기 후 스트림 재연결
    await new Promise(r => setTimeout(r, 100));

    // 기존 스트림이 없거나 끊겼으면 새로 시작
    if (!streamRef.current || !streamRef.current.active) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        streamRef.current = stream;
      } catch (err) {
        setError('카메라를 다시 시작할 수 없어요. 페이지를 새로고침해주세요.');
        setStage('start');
        return;
      }
    }

    // video 엘리먼트에 스트림 재연결
    if (videoRef.current && streamRef.current) {
      videoRef.current.srcObject = streamRef.current;
      videoRef.current.setAttribute('playsinline', 'true');
      videoRef.current.muted = true;
      try {
        await videoRef.current.play();
      } catch (e) {
        console.warn('재생 실패:', e);
      }
    }
  };

  const currentFilter = filters.find(f => f.name === filter)?.css || 'none';
  const currentFrame = frameColors.find(c => c.name === frameColor);

  return (
    <div className="min-h-screen bg-gradient-to-br from-rose-50 via-amber-50 to-sky-50 p-4">
      <canvas ref={canvasRef} className="hidden" />
      <canvas ref={finalCanvasRef} className="hidden" />

      <div className="max-w-md mx-auto">
        <header className="text-center py-6">
          <div className="flex items-center justify-center gap-2 mb-1">
            <SparkIcon className="w-5 h-5 text-rose-400" fill="currentColor" />
            <h1 className="text-4xl font-black tracking-tight text-stone-800 font-serif-display">
              인생네컷
            </h1>
            <SparkIcon className="w-5 h-5 text-rose-400" fill="currentColor" />
          </div>
          <p className="text-xs text-stone-500 tracking-[0.3em] uppercase mt-1">Life · 4 · Cuts</p>
        </header>

        {error && (
          <div className="bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl mb-4 text-sm text-center">
            {error}
          </div>
        )}

        {stage === 'start' && (
          <div className="bg-white rounded-3xl p-8 shadow-xl text-center">
            <div className="text-7xl mb-4">📸</div>
            <h2 className="text-2xl font-bold text-stone-800 mb-2">추억을 남겨볼까요?</h2>
            <p className="text-stone-500 mb-6 text-sm leading-relaxed">
              사진을 연속으로 찍어서<br />나만의 인생네컷을 만들어요
            </p>
            {/Instagram|FBAN|FBAV|KAKAOTALK|Line|NAVER/i.test(navigator.userAgent || '') && (
              <div className="bg-amber-50 border border-amber-300 text-amber-800 p-3 rounded-xl mb-4 text-xs leading-relaxed text-left">
                ⚠️ <b>인앱 브라우저 감지</b><br />
                인스타/카톡 안에서는 저장이 안 될 수 있어요.<br />
                <b>주소창 옆 ⋮ 메뉴 → "Chrome/Safari로 열기"</b>를 눌러주세요.
              </div>
            )}
            <button
              onClick={startCamera}
              className="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2"
            >
              <CameraIcon className="w-5 h-5" />
              카메라 시작하기
            </button>
            <p className="text-xs text-stone-400 mt-4">
              📱 모바일에서 더 편하게 사용할 수 있어요
            </p>
          </div>
        )}

        {(stage === 'ready' || stage === 'capturing') && (
          <div className="space-y-4">
            <div className="relative bg-black rounded-3xl overflow-hidden shadow-2xl aspect-[4/3]">
              <video
                ref={videoRef}
                autoPlay
                playsInline
                muted
                className="w-full h-full object-cover"
                style={{ transform: 'scaleX(-1)', filter: currentFilter }}
              />

              {isFlashing && <div className="absolute inset-0 bg-white flash pointer-events-none"></div>}

              {stage === 'capturing' && (
                <>
                  <div className="absolute top-4 left-4 bg-black/60 backdrop-blur text-white px-3 py-1.5 rounded-full text-sm font-bold">
                    {currentShot} / {layouts.find(l => l.name === layout).photoCount}
                  </div>
                  {countdown && (
                    <div className="absolute inset-0 flex items-center justify-center bg-black/10">
                      <div key={countdown} className="text-white text-9xl font-black drop-shadow-2xl pop">
                        {countdown}
                      </div>
                    </div>
                  )}
                </>
              )}

              {photos.length > 0 && (
                <div className="absolute bottom-4 left-4 flex gap-1.5">
                  {photos.map((p, i) => (
                    <img key={i} src={p} alt="" className="w-12 h-12 rounded-lg object-cover border-2 border-white shadow-lg" />
                  ))}
                </div>
              )}
            </div>

            {stage === 'ready' && (
              <>
                <div className="bg-white rounded-2xl p-4 shadow-md">
                  <p className="text-xs font-bold text-stone-500 mb-3 tracking-wider uppercase">레이아웃</p>
                  <div className="grid grid-cols-5 gap-2">
                    {layouts.map(l => (
                      <button
                        key={l.name}
                        onClick={() => setLayout(l.name)}
                        className={`flex flex-col items-center gap-1 p-2 rounded-xl transition-all ${
                          layout === l.name
                            ? 'bg-stone-900 text-white shadow-md'
                            : 'bg-stone-100 text-stone-600 hover:bg-stone-200'
                        }`}
                      >
                        <LayoutPreview layout={l} active={layout === l.name} />
                        <span className="text-[10px] font-semibold leading-tight text-center">{l.label}</span>
                      </button>
                    ))}
                  </div>
                  <p className="text-[10px] text-stone-400 mt-2 text-center">
                    총 {layouts.find(l => l.name === layout).photoCount}장 촬영
                  </p>
                </div>

                <div className="bg-white rounded-2xl p-4 shadow-md">
                  <p className="text-xs font-bold text-stone-500 mb-2 tracking-wider uppercase">필터</p>
                  <div className="flex gap-2 overflow-x-auto pb-1">
                    {filters.map(f => (
                      <button
                        key={f.name}
                        onClick={() => setFilter(f.name)}
                        className={`px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-all ${
                          filter === f.name
                            ? 'bg-stone-900 text-white shadow-md'
                            : 'bg-stone-100 text-stone-600 hover:bg-stone-200'
                        }`}
                      >
                        {f.label}
                      </button>
                    ))}
                  </div>
                </div>

                <button
                  onClick={startCapture}
                  className="w-full bg-rose-500 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-rose-600 hover:shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                >
                  <HeartIcon className="w-5 h-5" fill="currentColor" />
                  촬영 시작 ({layouts.find(l => l.name === layout).photoCount}장)
                </button>
                <p className="text-center text-xs text-stone-500">
                  5초 카운트다운 후 자동으로 촬영돼요
                </p>
              </>
            )}
          </div>
        )}

        {stage === 'done' && (
          <div className="space-y-4">
            <div className="bg-white rounded-2xl p-4 shadow-md">
              <p className="text-xs font-bold text-stone-500 mb-3 tracking-wider uppercase">프레임 색상</p>
              <div className="flex gap-2 overflow-x-auto pb-1">
                {frameColors.map(c => (
                  <button
                    key={c.name}
                    onClick={() => setFrameColor(c.name)}
                    className={`flex-shrink-0 w-12 h-12 rounded-full border-4 transition-all ${
                      frameColor === c.name ? 'border-stone-900 scale-110' : 'border-stone-200'
                    }`}
                    style={{ backgroundColor: c.bg }}
                    title={c.label}
                  />
                ))}
              </div>
            </div>

            <div className="flex justify-center">
              {finalImage ? (
                <img
                  src={finalImage}
                  alt="완성된 인생네컷"
                  className="rounded-2xl shadow-2xl max-h-[480px] w-auto"
                />
              ) : (
                <div className="rounded-2xl shadow-2xl bg-stone-200 animate-pulse" style={{ width: '200px', height: '400px' }}></div>
              )}
            </div>

            <div className="grid grid-cols-3 gap-2">
              <button
                onClick={reset}
                className="bg-white text-stone-700 py-4 rounded-2xl font-bold shadow-md hover:shadow-lg active:scale-95 transition-all flex flex-col items-center justify-center gap-1 text-xs"
              >
                <RefreshIcon className="w-4 h-4" />
                다시
              </button>
              <button
                onClick={shareImage}
                disabled={!finalImage}
                className="bg-rose-500 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-rose-600 active:scale-95 transition-all flex flex-col items-center justify-center gap-1 text-xs disabled:opacity-50"
              >
                <ShareIcon className="w-4 h-4" />
                공유
              </button>
              <button
                onClick={downloadImage}
                disabled={!finalImage}
                className="bg-stone-900 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex flex-col items-center justify-center gap-1 text-xs disabled:opacity-50"
              >
                <DownloadIcon className="w-4 h-4" />
                저장
              </button>
            </div>
          </div>
        )}

        <footer className="text-center mt-8 text-xs text-stone-400">
          ✨ Life 4 Cuts ✨
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Life4Cuts />);
</script>
</body>
</html>
